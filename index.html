<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數排盤與飛星輔助器 (重量級)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂紫微斗數宮格樣式 */
        body {
            background-color: #f3f4f6;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .ziwei-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background-color: #d1d5db; 
            border: 4px solid #374151;
            border-radius: 8px;
            padding: 4px;
        }
        .palace-cell {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .palace-cell:hover {
            background-color: #fef3c7;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
            z-index: 10;
        }
        .center-board {
            grid-column: 2 / span 2;
            grid-row: 2 / span 2;
            background-color: #f9fafb;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        /* 飛星與自化互動樣式 */
        .fly-source { border: 2px dashed #f59e0b; background-color: #fffbeb !important; }
        .star-tag-lu { font-size: 10px; background-color: #dcfce7; color: #166534; padding: 0 2px; border-radius: 2px; margin-left: 2px;}
        .star-tag-quan { font-size: 10px; background-color: #dbeafe; color: #1e3a8a; padding: 0 2px; border-radius: 2px; margin-left: 2px;}
        .star-tag-ke { font-size: 10px; background-color: #f3e8ff; color: #581c87; padding: 0 2px; border-radius: 2px; margin-left: 2px;}
        .star-tag-ji { font-size: 10px; background-color: #fee2e2; color: #991b1b; padding: 0 2px; border-radius: 2px; margin-left: 2px;}
        
        .fly-highlight-lu { box-shadow: inset 0 0 0 3px #22c55e; background-color: #f0fdf4 !important;}
        .fly-highlight-quan { box-shadow: inset 0 0 0 3px #3b82f6; background-color: #eff6ff !important;}
        .fly-highlight-ke { box-shadow: inset 0 0 0 3px #a855f7; background-color: #faf5ff !important;}
        .fly-highlight-ji { box-shadow: inset 0 0 0 3px #ef4444; background-color: #fef2f2 !important;}
        .fly-highlight-self { box-shadow: inset 0 0 0 3px #f59e0b; background-color: #fff7ed !important; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(245,158,11,0.1) 5px, rgba(245,158,11,0.1) 10px);}

        /* 疊盤標籤樣式 */
        .badge-decade { font-size: 10px; background-color: #1e40af; color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: inline-block;}
        .badge-annual { font-size: 10px; background-color: #047857; color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: inline-block;}

        /* 新增：卷軸樣式以利長內容呈現 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <!-- 左側：輸入控制面板 -->
        <div class="w-full lg:w-[380px] flex-shrink-0 space-y-4">
            
            <!-- 命造資料卡 -->
            <div class="bg-white p-5 rounded-xl shadow-lg border border-gray-200">
                <h1 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2 flex items-center justify-between">
                    <span>命造基本資料</span>
                    <span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">本命盤</span>
                </h1>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">出生年(西元)</label>
                            <input type="number" id="inputYear" value="1990" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">性別</label>
                            <select id="inputGender" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="M">男 (乾造)</option>
                                <option value="F">女 (坤造)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">農曆月</label>
                            <select id="inputMonth" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option><option value="4">四月</option><option value="5">五月</option><option value="6">六月</option><option value="7" selected>七月</option><option value="8">八月</option><option value="9">九月</option><option value="10">十月</option><option value="11">十一月</option><option value="12">十二月</option>
                            </select>
                        </div>
                        <div>

                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">時辰</label>
                            <select id="inputHour" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="1">子</option><option value="2">丑</option><option value="3">寅</option><option value="4">卯</option><option value="5" selected>辰</option><option value="6">巳</option><option value="7">午</option><option value="8">未</option><option value="9">申</option><option value="10">酉</option><option value="11">戌</option><option value="12">亥</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 運勢預測卡 (重量級核心) -->
            <div class="bg-gradient-to-br from-indigo-50 to-blue-50 p-5 rounded-xl shadow-lg border border-indigo-100">
                <h1 class="text-xl font-bold text-indigo-900 mb-4 border-b border-indigo-200 pb-2 flex items-center justify-between">
                    <span>大限與流年預測</span>
                    <span class="text-xs bg-indigo-600 text-white px-2 py-1 rounded shadow">疊盤分析</span>
                </h1>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-indigo-700 mb-1">要預測的年份 (西元)</label>
                        <div class="flex gap-2">
                            <input type="number" id="targetYear" value="2024" class="w-full text-sm border border-indigo-300 rounded p-1.5 focus:ring-indigo-500 font-bold text-indigo-900">
                            <button onclick="calculateChart()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-1.5 px-4 rounded shadow-md transition-colors whitespace-nowrap">
                                運算排盤
                            </button>
                        </div>
                        <p class="text-[11px] text-indigo-500 mt-1">系統將自動疊加該年的「大限命宮」與「流年命宮」</p>
                    </div>
                </div>
            </div>

            <!-- 飛星結果面板 -->
            <div class="bg-white p-5 rounded-xl shadow-lg border border-amber-200 flex flex-col max-h-[600px]" id="flyStarPanel" style="display: none;">
                <h3 class="font-bold text-amber-800 mb-2 flex items-center gap-1 shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    宮位解析與白話解盤
                </h3>
                <div id="flyStarResult" class="text-sm text-gray-700 space-y-1.5 overflow-y-auto custom-scrollbar pr-2 pb-2">
                    <!-- 動態載入飛星結果 -->
                </div>
            </div>
        </div>

        <!-- 右側：命盤顯示區 -->
        <div class="w-full lg:flex-1 flex items-center justify-center">
            <div id="ziweiBoard" class="ziwei-grid shadow-2xl">
                <!-- 盤面將透過 JavaScript 動態生成 -->
            </div>
        </div>
    </div>

    <script>
        // --- 核心資料 ---
        const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const palacesOrder = ["命宮", "兄弟", "夫妻", "子女", "財帛", "疾厄", "遷移", "交友", "官祿", "田宅", "福德", "父母"];
        
        const gridPositions = [
            "col-start-3 row-start-4", "col-start-2 row-start-4", "col-start-1 row-start-4", 
            "col-start-1 row-start-3", "col-start-1 row-start-2", "col-start-1 row-start-1", 
            "col-start-2 row-start-1", "col-start-3 row-start-1", "col-start-4 row-start-1", 
            "col-start-4 row-start-2", "col-start-4 row-start-3", "col-start-4 row-start-4"  
        ];

        const sihuaTable = [
            { stem: '甲', lu: '廉貞', quan: '破軍', ke: '武曲', ji: '太陽' },
            { stem: '乙', lu: '天機', quan: '天梁', ke: '紫微', ji: '太陰' },
            { stem: '丙', lu: '天同', quan: '天機', ke: '文昌', ji: '廉貞' },
            { stem: '丁', lu: '太陰', quan: '天同', ke: '天機', ji: '巨門' },
            { stem: '戊', lu: '貪狼', quan: '太陰', ke: '右弼', ji: '天機' },
            { stem: '己', lu: '武曲', quan: '貪狼', ke: '天梁', ji: '文曲' },
            { stem: '庚', lu: '太陽', quan: '武曲', ke: '太陰', ji: '天同' },
            { stem: '辛', lu: '巨門', quan: '太陽', ke: '文曲', ji: '文昌' },
            { stem: '壬', lu: '天梁', quan: '紫微', ke: '左輔', ji: '武曲' },
            { stem: '癸', lu: '破軍', quan: '巨門', ke: '太陰', ji: '貪狼' }
        ];

        // 新增：解盤字典
        const palaceDict = {
            '命宮': '你的「大腦中心」、「核心性格」或「預設的行事風格」。',
            '兄弟宮': '手足關係、平輩合夥人、也是現金存款的「庫」。',
            '夫妻宮': '你的「感情價值觀」、「喜歡的對象類型」以及「在親密關係中的樣子」。',
            '子女宮': '晚輩緣分、投資理財態度、桃花與性生活。',
            '財帛宮': '你的「理財觀念」、「賺錢的手段」和「現金流動狀態」。',
            '疾厄宮': '身體健康弱點、潛意識、脾氣與內在情緒。',
            '遷移宮': '外在展現、出外運勢、第一印象與社交人際關係。',
            '交友宮': '朋友部屬緣分、大眾市場、粉絲或客戶。',
            '官祿宮': '你的「工作態度」、「追求的成就感來源」和「學習模式」。',
            '田宅宮': '家運、不動產緣分、財富的最終「總庫」以及家庭氛圍。',
            '福德宮': '精神享受、晚年生活、潛在的理財思維與內心小劇場。',
            '父母宮': '長輩上司緣分、文書、法律合約、學業。'
        };

        const starDict = {
            '紫微': '帝王星。執行力強，但有時愛面子、耳根軟。',
            '天機': '智多星。心思細膩、聰明機智，但也容易想太多、神經質。',
            '太陽': '博愛星。像太陽一樣照顧人、熱心公益，有時會過度燃燒自己。',
            '武曲': '將星/財星。行動力超強、剛毅果決，但有時給人感覺比較孤傲、直接。',
            '天同': '福星。隨和、懂享受生活、人緣好，但有時會比較慵懶、情緒化。',
            '廉貞': '次桃花/囚星。公關手腕好、自信，但有時會過於執著、容易有是非。',
            '天府': '祿庫。穩重、包容力強、擅長守成與理財，但有時會過於保守。',
            '太陰': '富星/母星。柔情、心思細膩、有計畫性，但有時會多愁善感。',
            '貪狼': '大桃花。交際手腕高、慾望強、多才多藝，容易吸引人。',
            '巨門': '暗星。心思細膩、喜歡鑽研、口才好，但容易有口舌是非或容易懷疑。',
            '天相': '印星。熱心助人、注重形象、是很棒的輔佐人才，但容易受環境影響。',
            '天梁': '蔭星/壽星。喜歡照顧人、有老大作風、能逢凶化吉，但也有些孤高。',
            '七殺': '將星。開創力強、堅持到底、敢衝敢拼，但也比較衝動、肅殺。',
            '破軍': '耗星。勇於打破現狀、創新、行動力強，但過程容易消耗、先破後立。',
            '左輔': '容易遇到肯實質幫忙你的貴人。',
            '右弼': '容易遇到聰明機智、能幫你出主意的貴人(也有桃花意味)。',
            '文昌': '注重條理、文筆好、有才華。',
            '文曲': '口才好、感性、有多方面的才藝。',
            '祿存': '能將好處穩固下來，代表保守、逢凶化吉。',
            '擎羊': '行動力強、有毅力，但講話或做事比較直接，容易有摩擦。',
            '陀羅': '做事容易糾結、反覆，進度容易拖延，但也代表有耐心。',
            '火星': '爆發力強、脾氣來得快去得快。',
            '鈴星': '心思深沉、比較會記仇、反應快。',
            '地空': '思想天馬行空、有創意，但在物質或財務上容易有落空感。',
            '地劫': '對金錢或感情容易有「得而復失」的感覺，過程比較顛簸。',
            '天馬': '代表變動、奔波、驛馬星動，有升遷或遠行的機會。',
            '紅鸞': '感情緣分深、容易有喜慶之事、異性緣佳。',
            '天喜': '容易遇到開心的事情、有生育的機會。'
        };

        const sihuaExplanation = {
            '祿': '這領域就像老天爺給的「紅利」，會比較順遂、機會多。',
            '權': '你會有強烈的「企圖心與掌控慾」，容易有成就，但也比較緊繃。',
            '科': '這是你的「防護罩」，能平順度過困難，或獲得好名聲。',
            '忌': '這是你的「人生暑假作業」，因為太在乎，所以會覺得卡卡的、有壓力。'
        };

        // 新增：白話文產生器
        function generateColloquialExplanation(cellData, results, sihua) {
            let html = '<div class="mt-4 pt-3 border-t border-gray-200 text-sm space-y-3">';
            let palaceName = cellData.originalPalace;

            // 1. 宮位核心解釋
            html += `
                <div class="bg-indigo-50 p-3 rounded shadow-sm border-l-4 border-indigo-400">
                    <p class="font-bold text-indigo-800 mb-1">💡 【${palaceName}】對你的意義</p>
                    <p class="text-gray-700">${palaceDict[palaceName] || '這是你人生中的一個特定領域。'}</p>
                </div>
            `;

            // 2. 綜合星曜解釋
            let majorStars = cellData.stars.map(s => s.n);
            if (majorStars.length > 0) {
                 html += `<div class="bg-amber-50 p-3 rounded shadow-sm border-l-4 border-amber-400">
                            <p class="font-bold text-amber-800 mb-1">🌟 你的【${palaceName}】特質分析</p>
                            <p class="text-gray-700">你的${palaceName}裡住著：</p>
                            <ul class="list-disc list-inside mt-1 space-y-1">`;
                majorStars.forEach(star => {
                    html += `<li><span class="font-bold text-gray-800">${star}：</span>${starDict[star]}</li>`;
                });
                
                // 挑選幾個重要的煞星或吉星一起講
                 let minorStars = cellData.minorStars.map(s => s.n);
                 const importantMinors = ['擎羊', '陀羅', '火星', '鈴星', '地空', '地劫'];
                 let foundMinors = minorStars.filter(s => importantMinors.includes(s));
                 if(foundMinors.length > 0){
                     html += `</ul><p class="text-gray-700 mt-2">不過要注意喔，因為有 <span class="font-bold text-red-600">${foundMinors.join('、')}</span>，所以你也帶有：</p><ul class="list-disc list-inside mt-1 space-y-1">`;
                     foundMinors.forEach(star => {
                        html += `<li>${starDict[star]}</li>`;
                     });
                 }
                 html += `</ul></div>`;
            } else {
                 html += `
                    <div class="bg-amber-50 p-3 rounded shadow-sm border-l-4 border-amber-400">
                        <p class="font-bold text-amber-800 mb-1">🌟 你的【${palaceName}】特質分析</p>
                        <p class="text-gray-700 italic">這個宮位目前是「空宮」，代表這個領域你比較容易受到外在環境或對宮（對面的宮位）的影響，比較沒有既定的框架。</p>
                    </div>
                `;
            }

            // 3. 飛星動態解釋 (抓祿跟忌出來講)
            if (results.lu.p || results.ji.p) {
                 html += `<div class="bg-emerald-50 p-3 rounded shadow-sm border-l-4 border-emerald-400">
                            <p class="font-bold text-emerald-800 mb-1">🚀 飛星動態白話解</p>
                            <p class="text-gray-700">從星象軌跡來看，當你在處理【${palaceName}】的事情時：</p>
                            <ul class="mt-2 space-y-2">`;
                
                if (results.lu.p) {
                    if (results.lu.self) {
                         html += `<li>✨ 你會很自然地在這裡感到開心、有收穫，是一種 <span class="font-bold text-green-700">「自得其樂、願意付出」</span> 的狀態 (自化祿)。</li>`;
                    } else {
                         html += `<li>👉 你會把好處或緣分帶給你的 <span class="font-bold text-green-700">【${results.lu.p}】</span>。</li>`;
                    }
                }
                
                if (results.ji.p) {
                    if (results.ji.self) {
                         html += `<li>⚠️ 但有時候，你會突然在這裡覺得 <span class="font-bold text-red-700">「卡卡的、缺乏安全感」</span>，給自己莫名的壓力 (自化忌)。</li>`;
                    } else {
                         html += `<li>👉 你會不自覺地把壓力、執著，或是「太在乎」的情緒，轉移到你的 <span class="font-bold text-red-700">【${results.ji.p}】</span> 上。</li>`;
                    }
                }
                html += `</ul></div>`;
            }

            html += '</div>';
            return html;
        }

        let globalData = {}; // 儲存全域狀態

        // --- 輔助運算邏輯 ---
        function getStemBranch(year) {
            let sIdx = (year - 4 + 1000) % 10;
            let bIdx = (year - 4 + 1200) % 12;
            return { stem: stems[sIdx], stemIndex: sIdx, branch: branches[bIdx], branchIndex: bIdx };
        }

        function calculateLifePalaceIndex(month, hour) {
            return (2 + (month - 1) - (hour - 1) + 12) % 12;
        }

        function getPalaceStems(yearStemIdx) {
            const yinStemIdx = ((yearStemIdx % 5) * 2 + 2) % 10; 
            let palaceStems = new Array(12);
            for(let i = 0; i < 12; i++) palaceStems[i] = stems[(yinStemIdx + (i - 2 + 12) % 12) % 10];
            return palaceStems;
        }

        function getBureau(stemStr, branchIdx) {
            const sum = ((Math.floor(stems.indexOf(stemStr) / 2) + 1) + Math.floor((branchIdx % 6) / 2)) % 5 || 5;
            const bureauMap = {1:{name:'金四局', val:4}, 2:{name:'水二局', val:2}, 3:{name:'火六局', val:6}, 4:{name:'土五局', val:5}, 5:{name:'木三局', val:3}};
            return bureauMap[sum];
        }

        function calculateStars(day, bureauVal) {
            let addDays = (bureauVal - (day % bureauVal)) % bureauVal;
            let ziweiPos = (2 + Math.floor((day + addDays) / bureauVal) - 1 + (addDays % 2 === 1 ? -addDays : addDays) + 24) % 12;
            let tianfuPos = (16 - ziweiPos) % 12;

            let stars = Array(12).fill(null).map(() => []);
            
            [{n:'紫微',o:0}, {n:'天機',o:-1}, {n:'太陽',o:-3}, {n:'武曲',o:-4}, {n:'天同',o:-5}, {n:'廉貞',o:-8}].forEach(s => 
                stars[(ziweiPos + s.o + 12) % 12].push({n: s.n, color: 'text-purple-800'}));
            
            [{n:'天府',o:0}, {n:'太陰',o:1}, {n:'貪狼',o:2}, {n:'巨門',o:3}, {n:'天相',o:4}, {n:'天梁',o:5}, {n:'七殺',o:6}, {n:'破軍',o:10}].forEach(s => 
                stars[(tianfuPos + s.o) % 12].push({n: s.n, color: 'text-amber-700'}));
            return stars;
        }

        function calculateMinorStars(month, hour, yearStemIdx, yearBranchIdx) {
            let minors = Array(12).fill(null).map(() => []);
            const p = (pos, name, color) => minors[(pos % 12 + 12) % 12].push({n: name, color: color});

            // 六吉六煞
            p(4 + month - 1, '左輔', 'text-teal-600'); p(10 - month + 1, '右弼', 'text-teal-600');
            p(4 + hour - 1, '文曲', 'text-teal-600'); p(10 - hour + 1, '文昌', 'text-teal-600');
            p(11 + hour - 1, '地劫', 'text-gray-500'); p(11 - hour + 1, '地空', 'text-gray-500');

            const luCunPos = [2, 3, 5, 6, 5, 6, 8, 9, 11, 0][yearStemIdx];
            p(luCunPos, '祿存', 'text-red-600 font-bold'); p(luCunPos + 1, '擎羊', 'text-gray-500'); p(luCunPos - 1, '陀羅', 'text-gray-500');

            // 關鍵神煞 (重量級新增)
            // 天馬 (寅申巳亥)
            const maMap = {0:2, 4:2, 8:2, 1:11, 5:11, 9:11, 2:8, 6:8, 10:8, 3:5, 7:5, 11:5}; // 子辰申->寅(2) 等
            p(maMap[yearBranchIdx], '天馬', 'text-blue-500');
            // 紅鸞、天喜
            let luanPos = (3 - yearBranchIdx + 12) % 12;
            p(luanPos, '紅鸞', 'text-pink-500');
            p((luanPos + 6) % 12, '天喜', 'text-pink-500');

            return minors;
        }

        // --- 初始化與主程序 ---
        window.onload = () => {
            const daySelect = document.getElementById('inputDay');
            for (let i = 1; i <= 30; i++) daySelect.options.add(new Option(i + '日', i));
            daySelect.value = 15;
            calculateChart();
        };

        function calculateChart() {
            const year = parseInt(document.getElementById('inputYear').value);
            const month = parseInt(document.getElementById('inputMonth').value);
            const day = parseInt(document.getElementById('inputDay').value);
            const hour = parseInt(document.getElementById('inputHour').value);
            const gender = document.getElementById('inputGender').value;
            const targetYear = parseInt(document.getElementById('targetYear').value);

            // 1. 本命盤基本資料
            const birthData = getStemBranch(year);
            const lifePalaceIdx = calculateLifePalaceIndex(month, hour);
            const palaceStems = getPalaceStems(birthData.stemIndex);
            const bureau = getBureau(palaceStems[lifePalaceIdx], lifePalaceIdx);
            const birthSihua = sihuaTable[birthData.stemIndex];

            // 2. 星曜排佈
            const majorStars = calculateStars(day, bureau.val);
            const minorStars = calculateMinorStars(month, hour, birthData.stemIndex, birthData.branchIndex);

            // 3. 大限運算 (疊盤)
            const nominalAge = targetYear - year + 1;
            let isClockwise = (birthData.stemIndex % 2 === 0) === (gender === 'M');
            let decadePalaceIdx = -1;
            let decadeData = new Array(12);
            
            for (let i = 0; i < 12; i++) {
                let pos = isClockwise ? (lifePalaceIdx + i) % 12 : (lifePalaceIdx - i + 12) % 12;
                let startAge = bureau.val + i * 10;
                let endAge = startAge + 9;
                decadeData[pos] = `${startAge}-${endAge}`;
                if (nominalAge >= startAge && nominalAge <= endAge) {
                    decadePalaceIdx = pos;
                }
            }
            // 防呆：超過120歲或未出生
            if (decadePalaceIdx === -1) decadePalaceIdx = lifePalaceIdx; 

            const decadeStem = palaceStems[decadePalaceIdx];
            const decadeSihua = sihuaTable.find(s => s.stem === decadeStem);

            // 4. 流年運算 (疊盤)
            const targetData = getStemBranch(targetYear);
            const annualPalaceIdx = targetData.branchIndex; // 流年命宮=該年地支對應宮位
            const annualSihua = sihuaTable[targetData.stemIndex];

            // 5. 封裝全域資料 (12宮位陣列)
            let boardData = new Array(12).fill(null).map((_, i) => {
                let allMajor = majorStars[i].map(s => {
                    let tags = [];
                    // 本命四化標籤
                    if (s.n === birthSihua.lu) tags.push({ type: 'lu', label: '祿' });
                    if (s.n === birthSihua.quan) tags.push({ type: 'quan', label: '權' });
                    if (s.n === birthSihua.ke) tags.push({ type: 'ke', label: '科' });
                    if (s.n === birthSihua.ji) tags.push({ type: 'ji', label: '忌' });
                    return { ...s, tags: tags };
                });

                return { 
                    branch: branches[i], 
                    palaceStem: palaceStems[i],
                    originalPalace: "", // 本命宮位名稱
                    stars: allMajor,
                    minorStars: minorStars[i],
                    decadeRange: decadeData[i],
                    isDecadeMing: (i === decadePalaceIdx),
                    isAnnualMing: (i === annualPalaceIdx)
                };
            });

            for (let i = 0; i < 12; i++) {
                boardData[(lifePalaceIdx - i + 12) % 12].originalPalace = palacesOrder[i];
            }

            globalData = { 
                birthData, bureau, birthSihua, decadeSihua, annualSihua, 
                targetYear, nominalAge,
                boardData, activeFlyIdx: null, flyingSihua: null 
            };
            
            document.getElementById('flyStarPanel').style.display = 'none';
            renderBoard();
        }

        // --- 高階飛星與自化處理 ---
        function handlePalaceClick(clickedIndex) {
            if (globalData.activeFlyIdx === clickedIndex) {
                globalData.activeFlyIdx = null;
                globalData.flyingSihua = null;
                document.getElementById('flyStarPanel').style.display = 'none';
            } else {
                globalData.activeFlyIdx = clickedIndex;
                let cellData = globalData.boardData[clickedIndex];
                let stem = cellData.palaceStem;
                let sihua = sihuaTable.find(s => s.stem === stem);
                globalData.flyingSihua = sihua;
                
                // 尋找飛化落點與判定【自化】
                let results = { lu: {p:'', self:false}, quan: {p:'', self:false}, ke: {p:'', self:false}, ji: {p:'', self:false} };
                
                globalData.boardData.forEach((c, idx) => {
                    let allNames = [...c.stars, ...c.minorStars].map(s => s.n);
                    let isSelf = (idx === clickedIndex); // 飛回自己宮位 = 自化

                    if (allNames.includes(sihua.lu)) { results.lu.p = c.originalPalace; results.lu.self = isSelf; }
                    if (allNames.includes(sihua.quan)) { results.quan.p = c.originalPalace; results.quan.self = isSelf; }
                    if (allNames.includes(sihua.ke)) { results.ke.p = c.originalPalace; results.ke.self = isSelf; }
                    if (allNames.includes(sihua.ji)) { results.ji.p = c.originalPalace; results.ji.self = isSelf; }
                });

                // 修改面板的顯示方式為 flex 以支援我們新加的 layout
                document.getElementById('flyStarPanel').style.display = 'flex';
                
                // 產生飛星結果文案
                const makeResultRow = (typeStr, starName, resObj, colorClass, bgClass) => {
                    if (!resObj.p) return `<div class="bg-gray-50 p-1.5 rounded text-gray-400">化${typeStr}：無主星</div>`;
                    if (resObj.self) {
                        return `<div class="${bgClass} p-2 rounded border border-${colorClass.split('-')[1]}-300 flex justify-between items-center shadow-sm">
                                    <span>化${typeStr}：${starName}</span>
                                    <span class="${colorClass} font-black bg-white px-2 py-0.5 rounded shadow-sm text-xs animate-pulse">✨ 自化${typeStr} 出</span>
                                </div>`;
                    }
                    return `<div class="${bgClass} p-1.5 rounded flex justify-between items-center">
                                <span>化${typeStr}：${starName}</span>
                                <span class="${colorClass} font-bold text-xs">飛入 👉 ${resObj.p}</span>
                            </div>`;
                };

                // 產生白話解說 HTML
                let explanationHTML = generateColloquialExplanation(cellData, results, sihua);

                document.getElementById('flyStarResult').innerHTML = `
                    <div class="mb-3 text-gray-800 font-bold border-b border-gray-200 pb-2 sticky top-0 bg-white z-10 pt-1 flex justify-between items-center">
                        <span>選中 <span class="text-indigo-700 bg-indigo-50 px-1 rounded">${cellData.originalPalace} (${stem}${cellData.branch})</span></span>
                    </div>
                    <div class="flex flex-col gap-2 mb-2">
                        ${makeResultRow('祿', sihua.lu, results.lu, 'text-green-700', 'bg-green-50')}
                        ${makeResultRow('權', sihua.quan, results.quan, 'text-blue-700', 'bg-blue-50')}
                        ${makeResultRow('科', sihua.ke, results.ke, 'text-purple-700', 'bg-purple-50')}
                        ${makeResultRow('忌', sihua.ji, results.ji, 'text-red-700', 'bg-red-50')}
                    </div>
                    ${explanationHTML}
                `;
            }
            renderBoard();
        }

        // --- 畫面渲染 ---
        function renderBoard() {
            const board = document.getElementById('ziweiBoard');
            board.innerHTML = '';
            
            const { birthData, bureau, birthSihua, decadeSihua, annualSihua, targetYear, nominalAge, boardData, activeFlyIdx, flyingSihua } = globalData;

            boardData.forEach((data, index) => {
                const isLifePalace = data.originalPalace === "命宮";
                
                // 判斷飛星與自化高亮
                let highlightClass = '';
                if (activeFlyIdx !== null && flyingSihua) {
                    let allNames = [...data.stars, ...data.minorStars].map(s => s.n);
                    let isSelf = (activeFlyIdx === index);
                    
                    if (isSelf) {
                        highlightClass = 'fly-source'; // 預設來源色
                        // 如果有自化，覆蓋特殊動畫底色
                        if (allNames.includes(flyingSihua.lu) || allNames.includes(flyingSihua.quan) || 
                            allNames.includes(flyingSihua.ke) || allNames.includes(flyingSihua.ji)) {
                            highlightClass = 'fly-highlight-self';
                        }
                    } else {
                        if (allNames.includes(flyingSihua.lu)) highlightClass = 'fly-highlight-lu';
                        else if (allNames.includes(flyingSihua.quan)) highlightClass = 'fly-highlight-quan';
                        else if (allNames.includes(flyingSihua.ke)) highlightClass = 'fly-highlight-ke';
                        else if (allNames.includes(flyingSihua.ji)) highlightClass = 'fly-highlight-ji';
                    }
                }

                // 星曜渲染
                const renderStar = s => {
                    let tagHtml = s.tags.map(t => `<span class="star-tag-${t.type}">${t.label}</span>`).join('');
                    return `<div class="text-[14px] font-black ${s.color} tracking-wide flex items-center leading-tight">${s.n}${tagHtml}</div>`;
                };

                const majorStarsHTML = data.stars.map(renderStar).join('');
                const minorStarsHTML = data.minorStars.map(s => `<div class="text-[11px] ${s.color} font-medium">${s.n}</div>`).join('');

                // 疊盤標籤 (大限、流年命宮)
                let extraBadges = '';
                if (data.isDecadeMing) extraBadges += `<div class="badge-decade animate-pulse">限命</div>`;
                if (data.isAnnualMing) extraBadges += `<div class="badge-annual">流命</div>`;

                const cellHTML = `
                    <div class="palace-cell ${gridPositions[index]} ${isLifePalace && activeFlyIdx===null ? 'ring-2 ring-red-400 bg-red-50' : ''} ${highlightClass}" onclick="handlePalaceClick(${index})">
                        <div class="flex justify-between items-start border-b border-gray-100 pb-1 h-[20px]">
                            <span class="text-sm text-blue-800 font-bold">${data.palaceStem}</span>
                            <span class="text-[9px] text-gray-400 font-mono tracking-tighter">${data.decadeRange}</span>
                            <span class="text-sm text-gray-800 font-bold">${data.branch}</span>
                        </div>
                        <div class="flex-grow flex flex-col items-center justify-start mt-1 gap-1 overflow-hidden">
                            <div class="flex flex-wrap justify-center gap-x-1 gap-y-0.5">${majorStarsHTML}</div>
                            <div class="flex flex-wrap justify-center gap-x-1">${minorStarsHTML}</div>
                        </div>
                        <div class="flex flex-col items-center mt-1">
                            ${extraBadges}
                            <div class="text-[13px] font-bold ${isLifePalace ? 'text-red-600' : 'text-gray-600'} w-full text-center bg-white/80 rounded mt-0.5">
                                ${data.originalPalace}
                            </div>
                        </div>
                    </div>
                `;
                board.insertAdjacentHTML('beforeend', cellHTML);
            });

            // 生成中宮資訊 (三代四化展示區)
            const targetStemBranch = getStemBranch(targetYear);
            
            const makeSihuaGrid = (title, sihuaObj, themeColor) => `
                <div class="w-full bg-white p-2 rounded shadow-sm border-l-4 border-${themeColor}-500 text-left">
                    <div class="text-[10px] font-bold text-gray-500 mb-1">${title} <span class="text-${themeColor}-700">(${sihuaObj.stem}干)</span></div>
                    <div class="flex justify-between text-[11px] font-bold">
                        <span class="text-green-700">祿:${sihuaObj.lu}</span>
                        <span class="text-blue-700">權:${sihuaObj.quan}</span>
                        <span class="text-purple-700">科:${sihuaObj.ke}</span>
                        <span class="text-red-700">忌:${sihuaObj.ji}</span>
                    </div>
                </div>
            `;

            const centerHTML = `
                <div class="center-board">
                    <div class="flex items-end gap-2 mb-2 border-b-2 border-amber-400 pb-2">
                        <h2 class="text-2xl font-extrabold text-gray-800 leading-none">${birthData.stem}${birthData.branch}年</h2>
                        <span class="text-sm font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-full">${bureau.name}</span>
                    </div>
                    
                    <div class="bg-indigo-50 border border-indigo-200 rounded-md px-3 py-1 mb-3 text-sm font-bold text-indigo-800 shadow-inner">
                        預測年份: ${targetYear}年 (${targetStemBranch.stem}${targetStemBranch.branch}) · 虛歲 ${nominalAge}
                    </div>
                    
                    <div class="w-full max-w-[200px] flex flex-col gap-1.5 pointer-events-none">
                        ${makeSihuaGrid('本命四化 (原局)', birthSihua, 'gray')}
                        ${makeSihuaGrid('大限四化 (十年)', decadeSihua, 'indigo')}
                        ${makeSihuaGrid('流年四化 (今年)', annualSihua, 'emerald')}
                    </div>
                </div>
            `;
            board.insertAdjacentHTML('beforeend', centerHTML);
        }
    </script>
</body>
</html>
