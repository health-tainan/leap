<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗數排盤與飛星輔助器 (專業修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .ziwei-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background-color: #d1d5db; 
            border: 4px solid #374151;
            border-radius: 8px;
            padding: 4px;
        }
        .palace-cell {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .palace-cell:hover {
            background-color: #fef3c7;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
            z-index: 10;
        }
        .center-board {
            grid-column: 2 / span 2;
            grid-row: 2 / span 2;
            background-color: #f9fafb;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .fly-source { border: 2px dashed #f59e0b; background-color: #fffbeb !important; }
        .star-tag-lu { font-size: 10px; background-color: #dcfce7; color: #166534; padding: 0 2px; border-radius: 2px; margin-left: 1px;}
        .star-tag-quan { font-size: 10px; background-color: #dbeafe; color: #1e3a8a; padding: 0 2px; border-radius: 2px; margin-left: 1px;}
        .star-tag-ke { font-size: 10px; background-color: #f3e8ff; color: #581c87; padding: 0 2px; border-radius: 2px; margin-left: 1px;}
        .star-tag-ji { font-size: 10px; background-color: #fee2e2; color: #991b1b; padding: 0 2px; border-radius: 2px; margin-left: 1px;}
        
        .fly-highlight-lu { box-shadow: inset 0 0 0 3px #22c55e; background-color: #f0fdf4 !important;}
        .fly-highlight-quan { box-shadow: inset 0 0 0 3px #3b82f6; background-color: #eff6ff !important;}
        .fly-highlight-ke { box-shadow: inset 0 0 0 3px #a855f7; background-color: #faf5ff !important;}
        .fly-highlight-ji { box-shadow: inset 0 0 0 3px #ef4444; background-color: #fef2f2 !important;}
        .fly-highlight-self { box-shadow: inset 0 0 0 3px #f59e0b; background-color: #fff7ed !important; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(245,158,11,0.1) 5px, rgba(245,158,11,0.1) 10px);}

        .badge-decade { font-size: 10px; background-color: #1e40af; color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: inline-block;}
        .badge-annual { font-size: 10px; background-color: #047857; color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: inline-block;}
        .badge-body { font-size: 10px; background-color: #9d174d; color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: inline-block;}

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800">

    <div class="max-w-7xl mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-5 md:gap-6 items-start">
        
        <!-- 區塊一：輸入控制面板 (手機版排第 1，桌面版排左上) -->
        <div class="w-full lg:col-span-4 lg:col-start-1 lg:row-start-1 flex flex-col gap-4 order-1">
            
            <div class="bg-white p-4 md:p-5 rounded-xl shadow-md border border-gray-200">
                <h1 class="text-lg md:text-xl font-bold text-gray-800 mb-2 border-b pb-2 flex items-center justify-between">
                    <span>命造基本資料</span>
                    <span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">本命盤</span>
                </h1>
                <p class="text-[11px] text-red-600 font-bold mb-3 bg-red-50 p-1.5 rounded">⚠️ 請務必輸入「農曆」出生時間</p>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">農曆出生年</label>
                            <input type="number" id="inputYear" value="1990" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">性別</label>
                            <select id="inputGender" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="M">男 (乾造)</option>
                                <option value="F">女 (坤造)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">農曆月</label>
                            <select id="inputMonth" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option><option value="4">四月</option><option value="5">五月</option><option value="6">六月</option><option value="7" selected>七月</option><option value="8">八月</option><option value="9">九月</option><option value="10">十月</option><option value="11">十一月</option><option value="12">十二月</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">農曆日</label>
                            <select id="inputDay" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">時辰</label>
                            <select id="inputHour" class="w-full text-sm border border-gray-300 rounded p-1.5 focus:ring-amber-500">
                                <option value="1">子</option><option value="2">丑</option><option value="3">寅</option><option value="4">卯</option><option value="5" selected>辰</option><option value="6">巳</option><option value="7">午</option><option value="8">未</option><option value="9">申</option><option value="10">酉</option><option value="11">戌</option><option value="12">亥</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mt-1.5">
                        <input type="checkbox" id="inputLeap" class="rounded text-amber-600 focus:ring-amber-500">
                        <label class="text-[11px] font-medium text-gray-600" for="inputLeap">此月為閏月 (超過15日作下月排盤)</label>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-indigo-50 to-blue-50 p-4 md:p-5 rounded-xl shadow-md border border-indigo-100">
                <h1 class="text-base md:text-lg font-bold text-indigo-900 mb-3 border-b border-indigo-200 pb-2 flex items-center justify-between">
                    <span>運勢疊盤預測</span>
                </h1>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-bold text-indigo-700 mb-1">欲預測之農曆年份</label>
                        <div class="flex gap-2">
                            <input type="number" id="targetYear" value="2024" class="w-full text-sm border border-indigo-300 rounded p-1.5 focus:ring-indigo-500 font-bold text-indigo-900">
                            <button onclick="calculateChart()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-1.5 px-4 rounded shadow-sm transition-colors whitespace-nowrap">
                                重新排盤
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-3 md:p-4 rounded-xl shadow-md border border-gray-200">
                <details class="group">
                    <summary class="font-bold text-gray-800 text-sm flex items-center justify-between cursor-pointer list-none outline-none">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span>使用說明 (點擊展開)</span>
                        </div>
                        <span class="transition group-open:rotate-180">
                            <svg fill="none" height="20" shape-rendering="geometricPrecision" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 24 24" width="20"><path d="M6 9l6 6 6-6"></path></svg>
                        </span>
                    </summary>
                    <div class="mt-2.5 text-[12px] text-gray-600 space-y-2">
                        <p><strong class="text-gray-800">1. 排盤曆法：</strong>斗數以<span class="text-red-600 font-bold">純農曆</span>排盤，遇閏月時系統採「十五日分界法」。</p>
                        <p><strong class="text-gray-800">2. 如何看盤：</strong>點擊盤面上任何一個格子（例如點擊「夫妻」），系統會直接幫你翻譯成大白話，告訴你目前的心理狀態與運勢走向！若遇到無主星的「空宮」，系統會自動為您借對宮星曜來判讀。</p>
                    </div>
                </details>
            </div>

        </div>

        <!-- 區塊二：命盤顯示區 (手機版排第 2，桌面版排右側橫跨兩列) -->
        <div class="w-full lg:col-span-8 lg:col-start-5 lg:row-start-1 lg:row-span-2 flex flex-col items-center justify-start overflow-hidden order-2">
            <div class="text-xs text-amber-600 font-bold mb-2 md:hidden animate-pulse flex items-center gap-1.5 bg-amber-50 px-3 py-1 rounded-full border border-amber-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                向右滑動查看完整命盤
            </div>
            <div class="w-full overflow-x-auto custom-scrollbar pb-2">
                <div id="ziweiBoard" class="ziwei-grid shadow-xl min-w-[620px] lg:min-w-0">
                    <!-- 盤面動態生成 -->
                </div>
            </div>
        </div>

        <!-- 區塊三：飛星結果面板 (手機版排第 3 在命盤下方，桌面版排左下) -->
        <div class="w-full lg:col-span-4 lg:col-start-1 lg:row-start-2 order-3" id="flyStarPanelWrapper" style="display: none;">
            <div class="bg-white p-4 md:p-5 rounded-xl shadow-lg border-2 border-amber-300 flex flex-col max-h-[60vh] md:max-h-[600px]">
                <h3 class="font-bold text-amber-800 mb-2 flex items-center gap-1.5 shrink-0 text-base">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    🔮 生活化心理與運勢判讀
                </h3>
                <div id="flyStarResult" class="text-sm text-gray-700 space-y-1.5 overflow-y-auto custom-scrollbar pr-2 pb-2">
                </div>
            </div>
        </div>

    </div>

        const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

        let globalData = {};

        function getStemBranch(year) {
            let sIdx = (year - 4 + 1000) % 10;
            let bIdx = (year - 4 + 1200) % 12;
            return { stem: stems[sIdx], stemIndex: sIdx, branch: branches[bIdx], branchIndex: bIdx };
        }

        function getPalaceStems(yearStemIdx) {
            const yinStemIdx = ((yearStemIdx % 5) * 2 + 2) % 10; 
            let palaceStems = new Array(12);
            for(let i = 0; i < 12; i++) palaceStems[i] = stems[(yinStemIdx + (i - 2 + 12) % 12) % 10];
            return palaceStems;
        }

        function getBureau(stemStr, branchIdx) {
            let stemIdx = stems.indexOf(stemStr);
            let stemVal = Math.floor(stemIdx / 2) + 1;
            let branchVal = (Math.floor(branchIdx / 2) % 3) + 1;
            let sum = stemVal + branchVal;
            if (sum > 5) sum -= 5;
            
            const bureauMap = {1:{name:'木三局', val:3}, 2:{name:'金四局', val:4}, 3:{name:'水二局', val:2}, 4:{name:'火六局', val:6}, 5:{name:'土五局', val:5}};
            return bureauMap[sum] || {name:'水二局', val:2};
        }

        function calculateStars(day, bureauVal) {
            let addDays = (bureauVal - (day % bureauVal)) % bureauVal;
            let ziweiPos = (2 + Math.floor((day + addDays) / bureauVal) - 1 + (addDays % 2 === 1 ? -addDays : addDays) + 24) % 12;
            let tianfuPos = (16 - ziweiPos) % 12;

            let stars = Array(12).fill(null).map(() => []);
            
            [{n:'紫微',o:0}, {n:'天機',o:-1}, {n:'太陽',o:-3}, {n:'武曲',o:-4}, {n:'天同',o:-5}, {n:'廉貞',o:-8}].forEach(s => 
                stars[(ziweiPos + s.o + 12) % 12].push({n: s.n, color: 'text-purple-800'}));
            
            [{n:'天府',o:0}, {n:'太陰',o:1}, {n:'貪狼',o:2}, {n:'巨門',o:3}, {n:'天相',o:4}, {n:'天梁',o:5}, {n:'七殺',o:6}, {n:'破軍',o:10}].forEach(s => 
                stars[(tianfuPos + s.o) % 12].push({n: s.n, color: 'text-amber-700'}));
            return stars;
        }

        function calculateMinorStars(month, hour, yearStemIdx, yearBranchIdx) {
            let minors = Array(12).fill(null).map(() => []);
            const p = (pos, name, color) => minors[(pos % 12 + 12) % 12].push({n: name, color: color});

            // 1. 六吉六煞
            p(4 + month - 1, '左輔', 'text-teal-600'); p(10 - month + 1, '右弼', 'text-teal-600');
            p(4 + hour - 1, '文曲', 'text-teal-600'); p(10 - hour + 1, '文昌', 'text-teal-600');
            p(11 + hour - 1, '地劫', 'text-gray-500'); p(11 - hour + 1, '地空', 'text-gray-500');

            // 修正補回：火星、鈴星
            let huoStart, lingStart;
            if ([2, 6, 10].includes(yearBranchIdx)) { huoStart = 1; lingStart = 3; } // 寅午戌 -> 丑, 卯
            else if ([8, 0, 4].includes(yearBranchIdx)) { huoStart = 2; lingStart = 10; } // 申子辰 -> 寅, 戌
            else if ([5, 9, 1].includes(yearBranchIdx)) { huoStart = 3; lingStart = 10; } // 巳酉丑 -> 卯, 戌
            else { huoStart = 9; lingStart = 10; } // 亥卯未 -> 酉, 戌
            
            p(huoStart + hour - 1, '火星', 'text-gray-500');
            p(lingStart + hour - 1, '鈴星', 'text-gray-500');

            // 修正補回：天魁、天鉞
            let kuiPos, yuePos;
            switch(yearStemIdx) {
                case 0: case 4: case 6: kuiPos = 1; yuePos = 7; break; // 甲戊庚：丑未
                case 1: case 5: kuiPos = 0; yuePos = 8; break; // 乙己：子申
                case 2: case 3: kuiPos = 11; yuePos = 9; break; // 丙丁：亥酉
                case 8: case 9: kuiPos = 3; yuePos = 5; break; // 壬癸：卯巳
                case 7: kuiPos = 6; yuePos = 2; break; // 辛：午寅
            }
            p(kuiPos, '天魁', 'text-teal-600');
            p(yuePos, '天鉞', 'text-teal-600');

            // 祿存擎羊陀羅
            const luCunPos = [2, 3, 5, 6, 5, 6, 8, 9, 11, 0][yearStemIdx];
            p(luCunPos, '祿存', 'text-red-600 font-bold'); p(luCunPos + 1, '擎羊', 'text-gray-500'); p(luCunPos - 1, '陀羅', 'text-gray-500');

            // 天馬
            const maMap = {0:2, 4:2, 8:2, 1:11, 5:11, 9:11, 2:8, 6:8, 10:8, 3:5, 7:5, 11:5}; 
            p(maMap[yearBranchIdx], '天馬', 'text-blue-500');
            
            let luanPos = (3 - yearBranchIdx + 12) % 12;
            p(luanPos, '紅鸞', 'text-pink-500');
            p((luanPos + 6) % 12, '天喜', 'text-pink-500');

            return minors;
        }

        function calculateChart() {
            const year = parseInt(document.getElementById('inputYear').value);
            let month = parseInt(document.getElementById('inputMonth').value);
            const day = parseInt(document.getElementById('inputDay').value);
            const hour = parseInt(document.getElementById('inputHour').value);
            const gender = document.getElementById('inputGender').value;
            const targetYear = parseInt(document.getElementById('targetYear').value);
            const isLeap = document.getElementById('inputLeap').checked;

            if (isLeap && day > 15) {
                month = month === 12 ? 1 : month + 1;
            }

            const birthData = getStemBranch(year);
            const lifePalaceIdx = (2 + (month - 1) - (hour - 1) + 12) % 12;
            const bodyPalaceIdx = (2 + (month - 1) + (hour - 1)) % 12; 
            
            const palaceStems = getPalaceStems(birthData.stemIndex);
            const bureau = getBureau(palaceStems[lifePalaceIdx], lifePalaceIdx);
            const birthSihua = sihuaTable[birthData.stemIndex];

            const majorStars = calculateStars(day, bureau.val);
            const minorStars = calculateMinorStars(month, hour, birthData.stemIndex, birthData.branchIndex);

            const nominalAge = targetYear - year + 1;
            let isClockwise = (birthData.stemIndex % 2 === 0) === (gender === 'M');
            let decadePalaceIdx = -1;
            let decadeData = new Array(12);
            
            for (let i = 0; i < 12; i++) {
                let pos = isClockwise ? (lifePalaceIdx + i) % 12 : (lifePalaceIdx - i + 12) % 12;
                let startAge = bureau.val + i * 10;
                let endAge = startAge + 9;
                decadeData[pos] = `${startAge}-${endAge}`;
                if (nominalAge >= startAge && nominalAge <= endAge) {
                    decadePalaceIdx = pos;
                }
            }
            if (decadePalaceIdx === -1) decadePalaceIdx = lifePalaceIdx; 

            const decadeStem = palaceStems[decadePalaceIdx];
            const decadeSihua = sihuaTable.find(s => s.stem === decadeStem);

            const targetData = getStemBranch(targetYear);
            const annualPalaceIdx = targetData.branchIndex; 
            const annualSihua = sihuaTable[targetData.stemIndex];

            let boardData = new Array(12).fill(null).map((_, i) => {
                let allMajor = majorStars[i].map(s => {
                    let tags = [];
                    if (s.n === birthSihua.lu) tags.push({ type: 'lu', label: '祿' });
                    if (s.n === birthSihua.quan) tags.push({ type: 'quan', label: '權' });
                    if (s.n === birthSihua.ke) tags.push({ type: 'ke', label: '科' });
                    if (s.n === birthSihua.ji) tags.push({ type: 'ji', label: '忌' });
                    return { ...s, tags: tags };
                });

                return { 
                    branch: branches[i], 
                    palaceStem: palaceStems[i],
                    originalPalace: "", 
                    stars: allMajor,
                    minorStars: minorStars[i],
                    decadeRange: decadeData[i],
                    isBody: (i === bodyPalaceIdx),
                    isDecadeMing: (i === decadePalaceIdx),
                    isAnnualMing: (i === annualPalaceIdx)
                };
            });

            for (let i = 0; i < 12; i++) {
                boardData[(lifePalaceIdx - i + 12) % 12].originalPalace = palacesOrder[i];
            }

            globalData = { 
                birthData, bureau, birthSihua, decadeSihua, annualSihua, 
                targetYear, nominalAge,
                boardData, activeFlyIdx: null, flyingSihua: null 
            };
            
            document.getElementById('flyStarPanelWrapper').style.display = 'none';
            renderBoard();
        }

        function handlePalaceClick(clickedIndex) {
            if (globalData.activeFlyIdx === clickedIndex) {
                globalData.activeFlyIdx = null;
                globalData.flyingSihua = null;
                document.getElementById('flyStarPanelWrapper').style.display = 'none';
            } else {
                globalData.activeFlyIdx = clickedIndex;
                let cellData = globalData.boardData[clickedIndex];

                let results = { lu: {p:'', self:false}, quan: {p:'', self:false}, ke: {p:'', self:false}, ji: {p:'', self:false} };
                globalData.boardData.forEach((c, idx) => {
                    let allNames = [...c.stars, ...c.minorStars].map(s => s.n);
                    let isSelf = (idx === clickedIndex);
                    if (allNames.includes(sihua.lu)) { results.lu.p = c.originalPalace; results.lu.self = isSelf; }
                    if (allNames.includes(sihua.quan)) { results.quan.p = c.originalPalace; results.quan.self = isSelf; }
                    if (allNames.includes(sihua.ke)) { results.ke.p = c.originalPalace; results.ke.self = isSelf; }
                    if (allNames.includes(sihua.ji)) { results.ji.p = c.originalPalace; results.ji.self = isSelf; }

                document.getElementById('flyStarPanelWrapper').style.display = 'block';

            const targetStemBranch = getStemBranch(targetYear);
            const makeSihuaGrid = (title, sihuaObj, themeColor) => `
                <div class="w-full bg-white p-1 md:p-1.5 rounded shadow-sm border-l-4 border-${themeColor}-500 text-left hidden lg:block">
                    <div class="text-[9px] md:text-[10px] font-bold text-gray-500 mb-0.5">${title} <span class="text-${themeColor}-700">(${sihuaObj.stem}干)</span></div>
                    <div class="flex justify-between text-[10px] md:text-[11px] font-bold">
                        <span class="text-green-700">祿:${sihuaObj.lu}</span><span class="text-blue-700">權:${sihuaObj.quan}</span><span class="text-purple-700">科:${sihuaObj.ke}</span><span class="text-red-700">忌:${sihuaObj.ji}</span>
                    </div>
                </div>
            `;

            const centerHTML = `
                <div class="center-board">
                    <div class="flex items-end gap-1 md:gap-2 mb-1 md:mb-2 border-b-2 border-amber-400 pb-1 md:pb-2">
                        <h2 class="text-xl md:text-2xl font-extrabold text-gray-800 leading-none">${birthData.stem}${birthData.branch}年</h2>
                        <span class="text-xs md:text-sm font-bold text-blue-700 bg-blue-100 px-1.5 md:px-2 py-0.5 rounded-full">${bureau.name}</span>
                    </div>
                    <div class="bg-indigo-50 border border-indigo-200 rounded-md px-2 md:px-3 py-1 mb-1 md:mb-2 text-[11px] md:text-sm font-bold text-indigo-800 shadow-inner">
                        預測: ${targetYear}年 (${targetStemBranch.stem}${targetStemBranch.branch}) · 虛歲 ${nominalAge}
                    </div>
                    <div class="w-full max-w-[180px] md:max-w-[210px] flex flex-col gap-1 pointer-events-none">
                        ${makeSihuaGrid('本命四化', birthSihua, 'gray')}
                        ${makeSihuaGrid('大限四化', decadeSihua, 'indigo')}
                        ${makeSihuaGrid('流年四化', annualSihua, 'emerald')}
                    </div>
                </div>
            `;
            board.insertAdjacentHTML('beforeend', centerHTML);
        }
    </script>
</body>
</html>
